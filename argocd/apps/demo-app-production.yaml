apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Asamahamed/cloud-native-gitops-platform
    targetRevision: main
    path: kubernetes/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-production
  syncPolicy:
    # Production syncs are manual by default — promote via a Git PR + approval.
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
